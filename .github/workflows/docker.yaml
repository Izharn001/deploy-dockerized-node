name: Docker CI

on:
  push:
    branches:
    - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image with latest tag
        run: docker build -t izharn007/deploy-dockerized-node:latest .

      - name: Push latest tag
        run: docker push izharn007/deploy-dockerized-node:latest

      - name: Deploy to EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/initial-access.pem
          chmod 400 ~/.ssh/initial-access.pem

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/initial-access.pem ec2-user@${{ secrets.EC2_HOST }} << EOF
            sudo docker pull izharn007/deploy-dockerized-node:latest
            sudo docker stop deploy-dockerized-node || true
            sudo docker rm deploy-dockerized-node || true
            sudo docker run -d --name deploy-dockerized-node -p 80:3000 \
              -e USERNAME="${{ secrets.NODE_USERNAME }}" \
              -e PASSWORD="${{ secrets.NODE_PASSWORD }}" \
              -e SECRET_MESSAGE="${{ secrets.NODE_SECRET_MESSAGE }}" \
              izharn007/deploy-dockerized-node:latest
          EOF
